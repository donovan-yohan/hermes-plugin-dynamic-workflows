name: hermes-dynamic-workflows
version: "0.1.0"
description: >-
  Sandboxed, script-led orchestration over Hermes agents. Provides one model-facing
  workflow tool backed by workflow_validate, workflow_run, workflow_status,
  saved catalog/run_template operations, and debug/operator primitives with
  agent/kanban_agent/if/parallel/pipeline/phase composition,
  schema-validated structured output, parent-owned journaled run persistence,
  and a default-deny sandbox policy.
author: Hermes
license: MIT
provides_tools:
  - workflow
